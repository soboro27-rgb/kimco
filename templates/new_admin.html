{% extends "base.html" %}
{% block content %}
<h2>관리자 계정 추가</h2>
<div class="card" style="max-width:500px;">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/new">
        <label>이름</label>
        <input type="text" name="name" placeholder="홍길동" required>
        <label>아이디</label>
        <input type="text" name="username" placeholder="로그인 아이디" required>
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호" required>
        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn btn-primary" style="flex:1; padding:12px;">계정 생성</button>
            <a href="/dashboard" class="btn btn-secondary" style="padding:12px 20px;">취소</a>
        </div>
    </form>
</div>
{% endblock %}
