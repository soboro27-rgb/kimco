{% extends "base.html" %}
{% block content %}
<div style="max-width:420px; margin:80px auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:24px;">
            <div style="font-size:28px; font-weight:bold; color:#7c3aed;">Kim&amp;co</div>
            <div style="color:#6b7280; font-size:14px; margin-top:4px;">Claude 리포트 플랫폼</div>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <label>아이디</label>
            <input type="text" name="username" placeholder="아이디 입력" required>
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호 입력" required>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:15px;">로그인</button>
        </form>
    </div>
</div>
{% endblock %}
